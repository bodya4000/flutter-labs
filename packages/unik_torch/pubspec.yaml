name: unik_torch
description: Torch (flashlight) for UNIK labs (iOS & Android).
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.3
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.unik.unik_torch
        pluginClass: UnikTorchPlugin
      ios:
        pluginClass: UnikTorchPlugin
